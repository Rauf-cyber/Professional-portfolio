  <text x="84" y="378" fill="#79E2C0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Mar 2026 - Present</text>
  <text x="84" y="414" fill="#79E2C0" font-family="Arial, Helvetica, sans-serif" font-size="18">McLean, VA</text>
  <text x="300" y="382" fill="#F4F7FB" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800">Cybersecurity Engineer - Contract</text>
  <text x="300" y="424" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="24">Capital One</text>
  <text x="300" y="486" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="20">• Conduct security assessments across AWS, Azure, and GCP services</text>
  <text x="326" y="516" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="20">aligned with NIST 800-53 and CIS Benchmarks.</text>
  <text x="300" y="560" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="20">• Analyze cloud misconfigurations, excessive permissions, and</text>
  <text x="326" y="590" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="20">management-plane risks across enterprise cloud environments.</text>

  <text x="84" y="718" fill="#79E2C0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Jan 2025 - Feb 2026</text>
  <text x="84" y="754" fill="#79E2C0" font-family="Arial, Helvetica, sans-serif" font-size="18">Rockville, MD</text>
  <text x="300" y="722" fill="#F4F7FB" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800">Cybersecurity Analyst - Contract</text>
  <text x="300" y="764" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="24">U.S. Department of Health and Human Services, IHS Division</text>
  <text x="300" y="826" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="20">• Performed threat and security event assessments across</text>
  <text x="326" y="856" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="20">CrowdStrike, Cortex XDR, ExtraHop, and Azure IAM Identity Center.</text>
  <text x="300" y="900" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="20">• Investigated Splunk risk-based alerts and supported</text>
  <text x="326" y="930" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="20">vulnerability remediation and CSIRT response workflows.</text>

  <text x="84" y="1058" fill="#79E2C0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Jan 2024 - Dec 2024</text>
  <text x="84" y="1094" fill="#79E2C0" font-family="Arial, Helvetica, sans-serif" font-size="18">Vienna, VA</text>
  <text x="300" y="1062" fill="#F4F7FB" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800">Security Analyst - Contract</text>
  <text x="300" y="1104" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="24">Navy Federal Credit Union</text>
  <text x="300" y="1166" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="20">• Supported analysis of suspicious websites and external threats</text>
  <text x="326" y="1196" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="20">affecting members and enterprise visibility.</text>
  <text x="300" y="1240" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="20">• Conducted security and risk assessments aligned with</text>
  <text x="326" y="1270" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="20">NIST 800-37 and FedRAMP expectations.</text>

  <text x="84" y="1398" fill="#79E2C0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">May 2023 - Sep 2023</text>
