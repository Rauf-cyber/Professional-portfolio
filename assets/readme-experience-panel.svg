  <text x="300" y="832" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="20">• Investigated Splunk risk-based alerts and supported</text>
  <text x="326" y="862" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="20">vulnerability remediation and CSIRT response workflows.</text>

