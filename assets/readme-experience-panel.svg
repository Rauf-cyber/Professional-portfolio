  <text x="300" y="948" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="21">• Supported analysis of suspicious websites and external threats affecting members and enterprise visibility.</text>
  <text x="300" y="984" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="21">• Conducted risk assessments aligned with NIST 800-37 and FedRAMP.</text>

