  <text x="300" y="1444" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="24">Network-Fort</text>
  <text x="300" y="1506" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="20">• Identified and patched 150+ vulnerabilities using</text>
  <text x="326" y="1536" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="20">CrowdStrike Falcon and strengthened endpoint protection.</text>
  <text x="300" y="1580" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="20">• Implemented Azure Active Directory policies and improved</text>
  <text x="326" y="1610" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="20">response workflows through XSOAR and IAM support.</text>

