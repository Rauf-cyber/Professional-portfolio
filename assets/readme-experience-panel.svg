  <text x="300" y="1112" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="20">• Conducted security and risk assessments aligned with</text>
  <text x="326" y="1142" fill="#A9BBD3" font-family="Arial, Helvetica, sans-serif" font-size="20">NIST 800-37 and FedRAMP expectations.</text>

